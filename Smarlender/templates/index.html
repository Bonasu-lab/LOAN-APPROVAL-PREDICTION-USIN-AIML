<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Credit Evaluation Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; margin: auto; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #0056b3; color: white; border: none; padding: 12px; margin-top: 20px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #004085; }
        .result { margin-top: 20px; padding: 15px; background: #e2e3e5; text-align: center; font-size: 18px; font-weight: bold; border-radius: 4px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Lender Application</h2>
    <form action="/predict" method="POST">
        <label>Applicant Gender:</label>
        <select name="gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Marital Status:</label>
        <select name="married">
            <option value="1">Married</option>
            <option value="0">Unmarried</option>
        </select>

        <label>Education Level:</label>
        <select name="education">
            <option value="1">Graduate</option>
            <option value="0">Not Graduate</option>
        </select>

        <label>Employment Status:</label>
        <select name="employed">
            <option value="0">Salaried Profile</option>
            <option value="1">Self Employed / Irregular</option>
        </select>

        <label>Monthly Applicant Income ($):</label>
        <input type="number" name="income" required placeholder="e.g., 5500">

        <label>Requested Loan Amount ($):</label>
        <input type="number" name="loan_amount" required placeholder="e.g., 150">

        <label>Loan Term Duration (In Days):</label>
        <input type="number" name="loan_term" value="360" required>

        <label>Credit History Profile:</label>
        <select name="credit_history">
            <option value="1.0">Good Rating (1.0)</option>
            <option value="0.0">Bad / Missing History (0.0)</option>
        </select>

        <label>Property Geographic Area:</label>
        <select name="property_area">
            <option value="0">Rural</option>
            <option value="1">Semiurban</option>
            <option value="2">Urban</option>
        </select>

        <button type="submit">Evaluate Creditworthiness</button>
    </form>

    {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
    {% endif %}
</div>

</body>
</html>
